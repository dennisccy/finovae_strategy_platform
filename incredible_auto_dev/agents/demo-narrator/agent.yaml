name: demo-narrator
description: Per-iteration product demonstrator. Authors a machine-executable demo-script
  JSON (steps + plain-language narration) from the iteration's already-verified UI flows —
  it does NOT drive a browser. The deterministic Playwright runner (demo_runner.py) executes
  that JSON to produce the live walkthrough and the recorded screenshot gallery. Flags steps
  added or changed this iteration as `[NEW]`. Showcase, not QA — a failed step is a soft note,
  never a hard pipeline fail. Modes (selected by the dispatch wrapper) - record / live (this
  iteration's working surface) and session (the whole working product across iterations).
model_tier: standard
tools_allowed:
- Read
- Glob
- Grep
- Write
version: 2.0.0
last_updated: '2026-05-22'
body: body.md
claude:
  model_override: claude-sonnet-4-6
